<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>cambio nombre</title>
    </head>
    <body>
        <h2></h2>
        <form id="formulario">
            <input id="texto" type="text" placeholder="agregar texto">
            <button id="agregar">agregar titulo</button>
        </form>
        <script>
            const titu = document.querySelector("h2");
            const texto = document.getElementById("texto");
            const boto = document.getElementById("agregar");
            const formu = document.getElementById("formulario");

            formu.addEventListener("submit", (e) =>{
                e.preventDefault();
                let parra = texto.value;
                if(parra.trim() === ""){
                    alert("no se agrego nada al input");
                    return;
                }else{
                    titu.textContent = parra;
                }
            })
        </script>
    </body>
</html>
