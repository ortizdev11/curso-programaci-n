<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>To Do List</title>
        <link rel="icon" type="image/png" href="img/iconotodolist.png">
        
        <!--se le agrega la fuente de letra Monteserrat para la web-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <article id="to-do-list">
            <h1>To do List</h1>
            <div id="dividorList">
                <ul id="lista"></ul>
            </div>
            <div id="dividorCampo">
                <section id="containerDeTareas">
                    <ul>
                        <li id="tareas">Tareas: 0</li>
                        <li id="tareaCompletas">Completas: 0</li>
                        <li id="tareaspendiente">Pendiente: 0</li>
                    </ul>
                </section>
                <form id="formulario">
                    <input id="cuadroDeTexto" type="text" placeholder="Agregar tareas" required>
                    <button id="agregar">+</button>
                </form>
                <svg id="lunaCambio" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font 
                    Awesome Free v7.3.0 by @fontawesome - https://fontawesome.com License - 
                    https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--> <path
                     d="M320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576C388.8 576 451.3
                      548.8 497.3 504.6C504.6 497.6 506.7 486.7 502.6 477.5C498.5 468.3 488.9 462.6 
                      478.8 463.4C473.9 463.8 469 464 464 464C362.4 464 280 381.6 280 280C280 207.9 
                      321.5 145.4 382.1 115.2C391.2 110.7 396.4 100.9 395.2 90.8C394 80.7 386.6 72.5 376.7 70.3C358.4 66.2 339.4 64 320 64z"/></svg>           
            </div>        
        </article>        
        <script src="script.js"></script>
    </body>
</html>
